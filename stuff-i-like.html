<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things I Like</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
      font-family: "Times New Roman", serif;
    }

    .header-img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* DESKTOP: evenly spaced images in one row */
    .like-photos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 20px;
      flex-wrap: nowrap;
    }

    .like-photos img {
      height: 300px;
      width: auto;
      display: block;
    }

    /* ⭐ MOBILE: horizontal scroll bar */
    @media (max-width: 600px) {
      .like-photos {
        overflow-x: auto;
        white-space: nowrap;
        display: flex;
        gap: 12px;
        padding: 20px;
        -webkit-overflow-scrolling: touch;
      }

      .like-photos img {
        height: 220px;
        flex: 0 0 auto;
      }

      .like-photos::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER IMAGE -->
  <img class="header-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/emojik.jpg" alt="Header">

  <!-- LYRICS -->
  <div class="like-photos">

    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3878.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3885.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3887.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3889.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3890.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3891.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3893.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3894.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3895.JPEG">

  </div>

</body>
</html>
