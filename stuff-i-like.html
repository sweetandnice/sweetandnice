<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things I Like</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
      font-family: "Times New Roman", serif;
    }

    /* ⭐ DESKTOP HEADER */
    .header-img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ⭐ MOBILE HEADER */
    @media (max-width: 600px) {
      .header-img {
        content: url("https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/emojik-mobile.jpg");
      }
    }

    /* ⭐ SCROLL BAR */
    .like-photos {
      display: flex;
      gap: 12px;
      padding: 20px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
    }

    .like-photos::-webkit-scrollbar {
      display: none;
    }

    /* ⭐ IMAGE SIZE */
    .like-photos img {
      height: 240px;
      width: auto;
      flex: 0 0 auto;
      display: block;
    }

    @media (max-width: 600px) {
      .like-photos img {
        height: 180px;
      }
    }

    /* ⭐ MASONRY GRID */
.masonry {
  column-count: 4;
  column-gap: 16px;
  padding: 20px;
}

.masonry-item {
  break-inside: avoid;
  margin-bottom: 20px;
  color: white;
}

.masonry-item img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 8px;
  border-radius: 0;
  min-height: 40px; /* forces the browser to keep the space */
}

.masonry-item h3 {
  margin: 0 0 4px 0;
  font-size: 18px;
  font-weight: bold;
}

.masonry-item p {
  margin: 0 0 8px 0;
  font-size: 14px;
  opacity: 0.8;
}
    
.gif-wrapper {
  width: 100%;
  display: block;
}


/* ⭐ MOBILE */
@media (max-width: 600px) {
  .masonry {
    column-count: 1;
  }
}

  </style>
</head>

<body>

  <!-- ⭐ HEADER IMAGE -->
  <img class="header-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/emojik.jpg" alt="Header">

  <!-- ⭐ LYRICS SCROLLER -->
  <div class="like-photos">

    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3878.JPEG">

    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3890.JPEG">

    <a href="https://www.youtube.com/watch?v=NOZA8eqeiIk" target="_blank">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3894.JPEG">
    </a>

    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3893.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/lyrics/IMG_3895.JPEG">

  </div>

  <!-- ⭐ MASONRY GRID SECTION -->
<div class="masonry">

<div class="masonry-item">

</body>
</html>
