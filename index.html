<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunnie's Page</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Bradthen";
      src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
    }

    /* HEADER */
    .hero-header {
      width: 100%;
      text-align: center;
      padding-top: 20px;
    }

    .hero-header h1 {
      font-family: "Bradthen";
      font-size: 175px;
      font-weight: normal;
      color: #cdebf9;
      margin: 0;
      line-height: 0.9;
      letter-spacing: -3px;
      transform: rotate(-1deg);
    }

    @media (max-width: 768px) {
      .hero-header h1 {
        font-size: 90px;
      }
    }

    /* BODY TEXT */
    p {
      font-size: 20px;
      margin: 20px;
      color: #0000ff;
      max-width: 700px;
      line-height: 1.4;
    }

    /* SMALL IMAGES */
    .small-img {
      width: 180px;
      height: auto;
      display: block;
      margin: 20px auto;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .small-img {
        width: 140px;
      }
    }

    /* VIDEO WRAPPER */
    .video-wrapper {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      position: relative;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="hero-header">
    <h1>WELCOME TO MY PAGE</h1>
  </div>

  <!-- SMALL IMAGES (TEMPORARY INLINE) -->
  <img class="small-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/web.jpg">
  <img class="small-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/paprika.jpg">

  <!-- INTRO PARAGRAPH -->
  <p>
    My Name Is Eva Ruth.
    <a href="art.html">I draw and paint</a> and
    <a href="erf.html">I love Earth</a>.
    This is extra memory space to store my thoughts and document my life.
  </p>

  <!-- VIDEO -->
  <div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/TB-lQcuo5xU?si=CNowv26uHIbW42_d"
      title="YouTube video player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
