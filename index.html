<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunnie's Page</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Bradthen";
      src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
    }

    /* HEADER */
    .hero-header {
      width: 100%;
      text-align: center;
      padding-top: 20px;
    }

    .hero-header h1 {
      font-family: "Bradthen";
      font-size: 175px;
      font-weight: normal;
      color: #cdebf9;
      margin: 0;
      line-height: 0.9;
      letter-spacing: -3px;
      transform: rotate(-1deg);
    }

    @media (max-width: 768px) {
      .hero-header h1 {
        font-size: 90px;
      }
    }

    /* MAIN CONTENT GRID */
    .content {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      padding: 20px;
      align-items: start;
    }

    /* TEXT ON LEFT */
    .text-block {
      color: #0000ff;
      font-size: 20px;
      max-width: 500px;
      line-height: 1.4;
    }

    /* IMAGE AREA ON RIGHT (DESKTOP) */
    .image-group {
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    .image-group img {
      width: 150px;
      height: auto;
      border-radius: 0;
    }

    /* MOBILE LAYOUT */
    @media (max-width: 768px) {

      .content {
        grid-template-columns: 1fr;
      }

      /* TEXT + EYE SIDE BY SIDE */
      .text-block {
        display: flex;
        flex-direction: row;
        gap: 10px;
        align-items: flex-start;
      }

      .eye-desktop {
        display: none;
      }

      .eye-mobile {
        display: block;
        width: 120px;
      }

      /* OTHER TWO IMAGES BELOW */
      .image-group {
        justify-content: center;
      }

      .image-group img {
        width: 130px;
      }
    }

    /* DESKTOP: hide mobile eye */
    .eye-mobile {
      display: none;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="hero-header">
    <h1>WELCOME TO MY PAGE</h1>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- TEXT + (mobile eye) -->
    <div class="text-block">
      <p>
        My Name Is Eva Ruth.
        <a href="art.html">I draw and paint</a> and
        <a href="erf.html">I love Earth</a>.
        This is extra memory space to store my thoughts and document my life.
      </p>

      <!-- Eye image for mobile -->
      <img class="eye-mobile" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/eye.JPEG">
    </div>

    <!-- IMAGES -->
    <div class="image-group">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/web.jpg">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/paprika.jpg">
      <img class="eye-desktop" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/eye.JPEG">
    </div>

  </div>

</body>
</html>
