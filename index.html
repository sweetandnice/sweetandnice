<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunnie's Page</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Bradthen";
      src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
    }

    /* DESKTOP HEADER ROW */
    .header-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      flex-wrap: nowrap;
    }

    .header-row h1 {
      font-family: "Bradthen";
      font-size: 175px;
      color: #cdebf9;
      margin: 0;
      transform: rotate(-1deg);
      letter-spacing: -3px;
      line-height: 0.9;
      white-space: nowrap;
    }

    /* IMAGES KEEP PROPORTIONS */
    .header-row img {
      height: 150px;
      width: auto;
      border-radius: 0;
    }

    /* MOBILE LAYOUT */
    @media (max-width: 768px) {

      /* First row: title + eye */
      .header-row {
        flex-wrap: wrap;
        justify-content: center;
      }

      .header-row h1 {
        font-size: 90px;
      }

      /* Hide desktop images on mobile */
      .eye-desktop,
      .web-desktop,
      .paprika-desktop {
        display: none;
      }

      /* Show mobile eye */
      .eye-mobile {
        display: block;
        height: 90px;
        width: auto;
      }

      /* Second row: website + paprika */
      .image-row-mobile {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 10px;
      }

      .image-row-mobile img {
        height: 110px;
        width: auto;
      }
    }

    /* DESKTOP: hide mobile eye */
    .eye-mobile {
      display: none;
    }

    /* BIO TEXT */
    .text-block {
      color: #0000ff;
      font-size: 20px;
      max-width: 700px;
      margin: 20px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <!-- DESKTOP: title + eye + website + paprika -->
  <!-- MOBILE: title + eye only -->
  <div class="header-row">

    <h1>WELCOME TO MY PAGE</h1>

    <!-- Eye (desktop version) -->
    <img class="eye-desktop" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/eye.JPEG">

    <!-- Eye (mobile version) -->
    <img class="eye-mobile" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/eye.JPEG">

    <!-- Website + Paprika (desktop only) -->
    <img class="web-desktop" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/web.jpg">
    <img class="paprika-desktop" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/paprika.jpg">

  </div>

  <!-- MOBILE: second row (website + paprika) -->
  <div class="image-row-mobile">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/web.jpg">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/paprika.jpg">
  </div>

  <!-- BIO TEXT (never interacts with images) -->
  <div class="text-block">
    <p>
      My Name Is Eva Ruth.
      <a href="art.html">I draw and paint</a> and
      <a href="erf.html">I love Earth</a>.
      This is extra memory space to store my thoughts and document my life.
    </p>
  </div>

</body>
</html>
