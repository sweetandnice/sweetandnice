<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunnie's Page</title>

<style>
body {
  background-color: black;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: "Bradthen";
  src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
  font-weight: 400;
}

/* DESKTOP LAYOUT (default) */
.header-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.header-row h1 {
  font-family: "Bradthen";
  font-size: 150px;
  color: #cdebf9;
  margin: 0;
  transform: rotate(-1deg);
  letter-spacing: -3px;
  line-height: 0.9;
  white-space: nowrap;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

.header-row img {
  height: 130px;
  width: auto;
}

/* Make the two wrapper divs disappear on desktop so all 4 items sit in one row */
@media (min-width: 769px) {
  .header-row-top,
  .header-row-bottom {
    display: contents;
  }
}

/* MOBILE LAYOUT */
@media (max-width: 768px) {

  /* Let grid see all 4 items */
  .header-row-top,
  .header-row-bottom {
    display: contents;
  }

  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 14px;
  }

  /* Row 1: Title + Eye */
  .header-row h1 {
    grid-column: 1;
    font-size: 50px;   /* bigger text */
    margin: 0;
    line-height: 1.1;
  }

  .eye {
    grid-column: 2;
    justify-self: end;
    height: 38px;      /* smaller eye */
    width: auto;
  }

  /* Row 2: Web + Paprika */
  .web,
  .paprika {
    grid-row: 2;
    width: 100%;
    height: 110px;     /* SAME height for both */
    object-fit: cover; /* fills the box without distortion */
    border-radius: 4px;
  }

  .web { grid-column: 1; }
  .paprika { grid-column: 2; }
}

/* BIO TEXT */
.text-block {
  color: #0000ff;
  font-size: 20px;
  max-width: 700px;
  margin: 20px auto;
  line-height: 1.4;
  text-align: left;
}
</style>
</head>

<body>

<div class="header-row">

  <!-- Row 1 (mobile) -->
  <div class="header-row-top">
    <h1>WELCOME TO MY PAGE</h1>
    <img class="eye" src="pics/eye.JPEG" alt="Eye">
  </div>

  <!-- Row 2 (mobile) -->
  <div class="header-row-bottom">
    <img class="web" src="pics/web.jpg" alt="Web">
    <img class="paprika" src="pics/paprika.jpg" alt="Paprika">
  </div>

</div>

<div class="text-block">
  <p>
    My Name Is Eva Ruth.
    <a href="art.html">I draw and paint</a> and
    <a href="erf.html">I love Earth</a>.
    This is extra memory space to store my thoughts and document my life.
  </p>
</div>

</body>
</html>
