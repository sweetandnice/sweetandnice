<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunnie's Page</title>

<style>
body {
  background-color: black;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: "Bradthen";
  src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
  font-weight: 400;
}

/* DESKTOP LAYOUT (default) */
.header-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.header-row h1 {
  font-family: "Bradthen";
  font-size: 150px;
  color: #cdebf9;
  margin: 0;
  transform: rotate(-1deg);
  letter-spacing: -3px;
  line-height: 0.9;
  white-space: nowrap;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

.header-row img {
  height: 130px;
  width: auto;
}

/* Desktop: show desktop hero, hide mobile hero */
@media (min-width: 769px) {
  .header-row-top,
  .header-row-bottom {
    display: contents;
  }

  .hero-mobile { display: none; }
  .hero-desktop { display: block; width: 100%; }

  .video-wrapper {
    width: 50%;
    margin: 0 auto;
  }
}

/* MOBILE LAYOUT */
@media (max-width: 768px) {

  .header-row-top,
  .header-row-bottom {
    display: contents;
  }

  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    padding: 16px;
  }

  /* Row 1 */
  .header-row h1 {
    grid-column: 1;
    font-size: 75px;
    margin: 0;
    line-height: 1.05;
  }

  .header-row .eye {
    grid-column: 2;
    justify-self: end;
    height: 75px;
    width: auto;
    align-self: start;
    margin-top: -10px; /* move eye upward */
  }

  /* Row 2 — flexbox row */
  .header-row-bottom {
    grid-column: 1 / span 2;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .header-row-bottom img {
    height: 100px;
    width: auto;
    display: block;
  }

  /* Mobile hero visible */
  .hero-mobile { display: block; width: 100%; }
  .hero-desktop { display: none; }

  .video-wrapper {
    width: 100%;
  }
}

/* BIO TEXT */
.text-block {
  color: #0000ff;
  font-size: 20px;
  max-width: 700px;
  margin: 20px auto;
  line-height: 1.4;
  text-align: left;
}

/* Responsive YouTube embed */
.video-wrapper iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
}
</style>
</head>

<body>

<div class="header-row">

  <!-- Row 1 (mobile) -->
  <div class="header-row-top">
    <h1>WELCOME TO MY PAGE</h1>
    <img class="eye" src="pics/eye.JPEG" alt="Eye">
  </div>

  <!-- Row 2 (mobile) -->
  <div class="header-row-bottom">
    <img class="web" src="pics/web.jpg" alt="Web">
    <img class="paprika" src="pics/paprika.jpg" alt="Paprika">
  </div>

</div>

<!-- ROW 3: Full-width hero image -->
<img class="hero-mobile" src="pics/pre_mobile.jpg" alt="Hero Mobile">
<img class="hero-desktop" src="pics/pre_desktop.jpg" alt="Hero Desktop">

<div class="text-block">
  <p>
    My Name Is Eva Ruth.
    <a href="art.html">I draw and paint</a> and
    <a href="erf.html">I love Earth</a>.
    This is extra memory space to store my thoughts and document my life.
  </p>
</div>

<!-- YouTube video -->
<div class="video-wrapper">
  <iframe 
    src="https://www.youtube.com/embed/TB-lQcuo5xU?si=Q1pGS3LKtBbIA8XG"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
