<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunnie's Page</title>

<style>
body {
  background-color: black;
  margin: 0;
  padding: 0;
}

@font-face {
  font-family: "Bradthen";
  src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
  font-weight: 400;
}

/* DESKTOP LAYOUT (default) */
.header-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.header-row h1 {
  font-family: "Bradthen";
  font-size: 150px;
  color: #cdebf9;
  margin: 0;
  transform: rotate(-1deg);
  letter-spacing: -3px;
  line-height: 0.9;
  white-space: nowrap;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

.header-row img {
  height: 130px;
  width: auto;
}

/* Desktop: show desktop hero, hide mobile hero */
@media (min-width: 769px) {
  .header-row-top,
  .header-row-bottom {
    display: contents;
  }

  .hero-mobile { display: none; }
  .hero-desktop { display: block; width: 100%; }

  .video-wrapper {
    width: 50%;
    margin: 0 auto;
  }
}

/* MOBILE LAYOUT */
@media (max-width: 768px) {

  .header-row-top,
  .header-row-bottom {
    display: contents;
  }

  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    padding: 16px;
  }

  /* Row 1 */
  .header-row h1 {
    grid-column: 1;
    font-size: 75px;
    margin: 0;
    line-height: 1.05;
  }

  .header-row .eye {
    grid-column: 2;
    justify-self: end;
    height: 75px;
    width: auto;
    align-self: start;
    margin-top: -10px;
  }

  /* Row 2 */
  .header-row-bottom {
    grid-column: 1 / span 2;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .header-row-bottom img {
    height: 100px;
    width: auto;
    display: block;
  }

  .hero-mobile { display: block; width: 100%; }
  .hero-desktop { display: none; }

  .video-wrapper {
    width: 100%;
  }
}

/* Make text block full width */
.text-block {
  color: #0000ff;
  font-size: 20px;
  width: 100%;
  max-width: none;
  padding: 0 20px;
  margin: 10px auto 5px auto; /* reduced spacing */
  line-height: 1.4;
  text-align: center;
  box-sizing: border-box;
}

/* Base iframe styling */
.video-wrapper iframe {
  width: 100%;
  border: none;
}

/* DESKTOP: video matches exact height of image stacks AND stays wide */
@media (min-width: 769px) {
  .video-wrapper iframe {
    height: 850px;        /* matches stack height */
    width: 100%;          /* stays wide */
    aspect-ratio: unset;  /* override 16:9 */
    object-fit: cover;    /* prevents skinny shrinking */
    display: block;
  }
}

/* --- IMAGE + VIDEO TRIPTYCH LAYOUT --- */

.video-section {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
  margin: 10px auto; /* reduced spacing */
  max-width: 1300px;
  padding: 0 20px;
}

/* spacing between stacked images + remove curve */
.side-stack {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.side-stack img {
  width: 210px;
  height: auto;
  border-radius: 0;
  display: block;
}

/* Make video bigger */
.video-center {
  flex: 1;
  max-width: 1100px;
}

.video-wrapper {
  width: 100%;
}


.video-wrapper {
  width: 100%;
}

/* MOBILE — stacks become horizontal scroll strips */
@media (max-width: 768px) {

  .video-section {
    flex-direction: column;
    align-items: center;
    gap: 25px;
  }

  .side-stack {
    flex-direction: row;
    overflow-x: auto;
    white-space: nowrap;
    gap: 12px;
    padding-bottom: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .side-stack img {
    width: 180px;
    flex: 0 0 auto;
  }

  .side-stack::-webkit-scrollbar {
    display: none;
  }

  .video-center {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header-row">

  <!-- Row 1 (mobile) -->
  <div class="header-row-top">
    <h1>WELCOME TO MY PAGE</h1>
    <img class="eye" src="pics/eye.JPEG" alt="Eye">
  </div>

  <!-- Row 2 (mobile) -->
  <div class="header-row-bottom">
    <img class="web" src="pics/web.jpg" alt="Web">
    <img class="paprika" src="pics/paprika.jpg" alt="Paprika">
  </div>

</div>

<!-- ROW 3: Full-width hero image -->
<img class="hero-mobile" src="pics/ev_mobile.jpg" alt="Hero Mobile">
<img class="hero-desktop" src="pics/ev_desktop.jpg" alt="Hero Desktop">

<div class="text-block">
  <p>
    My Name Is Eva Ruth.
    <a href="art.html">I draw and paint</a> and
    <a href="erf.html">I love Earth</a>.
    This is extra memory space to store my thoughts and document my life.
  </p>
</div>

<!-- ⭐ NEW IMAGE + VIDEO TRIPTYCH SECTION -->
<div class="video-section">

  <!-- LEFT STACK -->
  <div class="side-stack">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-155400%20(1).JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-155400.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-155926002.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-160113.JPEG">
  </div>

  <!-- CENTER VIDEO -->
  <div class="video-center">
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/TB-lQcuo5xU?si=Q1pGS3LKtBbIA8XG"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- RIGHT STACK -->
  <div class="side-stack">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-160312.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-161529.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-161952002.JPEG">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/20250306-161844.JPEG">
  </div>

</div>

</body>
</html>
