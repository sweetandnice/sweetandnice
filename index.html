<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunnie's Page</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Bradthen";
      src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
      font-weight: 400;
    }

    /* BASE HEADER ROW */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      max-width: 100%;
    }

    .header-row h1 {
      font-family: "Bradthen";
      font-size: 150px;
      color: #cdebf9;
      margin: 0;
      transform: rotate(-1deg);
      letter-spacing: -3px;
      line-height: 0.9;
      white-space: nowrap;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* Desktop images */
    .header-row img {
      height: 130px;
      width: auto;
    }

    /* DESKTOP ONLY */
    @media (min-width: 769px) {
      .header-row {
        flex-wrap: nowrap;
      }
    }

    /* MOBILE LAYOUT */
    @media (max-width: 768px) {

      /* First row: WELCOME + EYE */
      .header-row-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 10px;
      }

      .header-row-top h1 {
        font-size: 60px;
        line-height: 1.0;
        flex: 1;
      }

      .header-row-top .eye {
        height: 55px; /* balanced size */
        flex: 0 0 auto;
        margin-left: 15px;
      }

      /* Second row: WEB + PAPRIKA */
      .header-row-bottom {
        display: flex;
        justify-content: space-between;
        align-items: stretch; /* make images same height */
        width: 100%;
        padding: 10px;
        gap: 10px;
      }

      .header-row-bottom img {
        height: 150px; /* fixed height so both match */
        width: auto;   /* maintain aspect ratio */
        object-fit: cover;
        flex: 1 1 0; /* equal width */
      }
    }

    /* BIO TEXT */
    .text-block {
      color: #0000ff;
      font-size: 20px;
      max-width: 700px;
      margin: 20px auto;
      line-height: 1.4;
      text-align: left;
    }
  </style>
</head>

<body>

  <!-- Mobile-friendly header with two separate rows -->
  <div class="header-row header-row-top">
    <h1>WELCOME TO MY PAGE</h1>
    <img class="eye" src="pics/eye.JPEG" alt="Eye">
  </div>

  <div class="header-row header-row-bottom">
    <img class="web" src="pics/web.jpg" alt="Web">
    <img class="paprika" src="pics/paprika.jpg" alt="Paprika">
  </div>

  <div class="text-block">
    <p>
      My Name Is Eva Ruth.
      <a href="art.html">I draw and paint</a> and
      <a href="erf.html">I love Earth</a>.
      This is extra memory space to store my thoughts and document my life.
    </p>
  </div>

</body>
</html>
