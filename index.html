<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunnie's Page</title>

  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Bradthen";
      src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
      font-weight: 400;
    }

    /* BASE HEADER ROW (desktop + mobile) */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      max-width: 100%;
      flex-wrap: nowrap; /* default desktop layout */
    }

    .header-row h1 {
      font-family: "Bradthen";
      font-size: 150px;
      color: #cdebf9;
      margin: 0;
      transform: rotate(-1deg);
      letter-spacing: -3px;
      line-height: 0.9;
      white-space: nowrap;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .header-row img {
      height: 130px;
      width: auto;
    }

    /* MOBILE LAYOUT */
    @media (max-width: 768px) {

      .header-row {
        flex-direction: column; /* stack rows */
        align-items: flex-start; 
        padding: 10px;
        gap: 10px;
      }

      /* First row: title + eye */
      .header-row h1, .header-row .eye {
        order: 1;
      }

      .header-row h1 {
        font-size: 60px;
        line-height: 1;
      }

      .header-row .eye {
        height: 55px;
        align-self: flex-end; /* place on right */
      }

      /* Second row: web + paprika */
      .web, .paprika {
        order: 2;
        height: 150px;   /* same height for both */
        width: auto;     /* maintain aspect ratio */
        object-fit: cover;
      }

      .header-row .web, .header-row .paprika {
        align-self: stretch;
      }

      /* Arrange side by side */
      .header-row .web, .header-row .paprika {
        display: inline-block;
        width: 48%;
        margin-right: 2%;
      }

      .header-row .paprika {
        margin-right: 0;
      }
    }

    /* BIO TEXT */
    .text-block {
      color: #0000ff;
      font-size: 20px;
      max-width: 700px;
      margin: 20px auto;
      line-height: 1.4;
      text-align: left;
    }
  </style>
</head>

<body>

  <div class="header-row">
    <h1>WELCOME TO MY PAGE</h1>
    <img class="eye" src="pics/eye.JPEG" alt="Eye">
    <img class="web" src="pics/web.jpg" alt="Web">
    <img class="paprika" src="pics/paprika.jpg" alt="Paprika">
  </div>

  <div class="text-block">
    <p>
      My Name Is Eva Ruth.
      <a href="art.html">I draw and paint</a> and
      <a href="erf.html">I love Earth</a>.
      This is extra memory space to store my thoughts and document my life.
    </p>
  </div>

</body>
</html>
