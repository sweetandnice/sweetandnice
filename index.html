<style>
  body {
    background-color: black;
    margin: 0;
    padding: 0;
  }

  @font-face {
    font-family: "Bradthen";
    src: url("fonts/Bradthen-JRz5E.otf") format("opentype");
    font-weight: 400;
  }

  /* ONE FLEX ROW FOR EVERYTHING */
  .header-row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    flex-wrap: nowrap;
    max-width: 100%;
    overflow-x: hidden;
  }

  .header-row h1 {
    font-family: "Bradthen";
    font-size: 150px; /* slightly smaller so everything fits */
    color: #cdebf9;
    margin: 0;
    transform: rotate(-1deg);
    letter-spacing: -3px;
    line-height: 0.9;
    white-space: nowrap;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  /* IMAGES KEEP PROPORTIONS */
  .header-row img {
    height: 130px; /* slightly smaller */
    width: auto;
    border-radius: 0;
  }

  /* MOBILE LAYOUT */
@media (max-width: 768px) {

  .header-row {
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 5px;
  }

  .header-row h1 {
    font-size: 50px;
    order: 1;
  }

  .eye {
    height: 40px;
    order: 2;
    flex: 0 0 auto;
  }

  /* WEBSITE + PAPRIKA ALWAYS ON ROW 2 */
  .web {
    height: 65px;
    width: 45%;   /* forces them to share row 2 */
    order: 3;
    flex: 0 0 45%;
  }

  .paprika {
    height: 65px;
    width: 45%;   /* forces them to share row 2 */
    order: 4;
    flex: 0 0 45%;
  }
}


  /* BIO TEXT */
  .text-block {
    color: #0000ff;
    font-size: 20px;
    max-width: 700px;
    margin: 20px;
    line-height: 1.4;
  }
</style>

<div class="header-row">

  <img class="eye" src="pics/eye.JPEG">
  <img class="web" src="pics/web.jpg">
  <img class="paprika" src="pics/paprika.jpg">
</div>

<div class="text-block">
  <p>
    My Name Is Eva Ruth.
    <a href="art.html">I draw and paint</a> and
