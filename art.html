<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About My Art</title>

  <style>
    body {
      background-color: black;
    }

    p {
      font-size: 20px;
      color: white;
    }

    .side-by-side {
      display: flex;
      align-items: flex-start;
      gap: 30px;
    }

    .portrait-block {
      flex-shrink: 0;
      text-align: left;
    }

    .portrait-caption {
      color: white;
      font-size: 20px;
      margin-top: 8px;
    }

    .gallery-block {
      display: inline-block;
    }

    .gallery {
      display: inline-block;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }

    .gallery img {
      height: 350px;
      width: auto;
      border: 4px solid #ff008f;
      display: block;
    }

    .caption {
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      font-size: 18px;
      margin: 8px 0 20px 0;
      text-align: left;
    }

    #caption1 {
      color: #ff008f;
    }

    #caption2 {
      color: #fff100;
    }
  </style>
</head>

<body>

  <div class="side-by-side">

    <div class="portrait-block">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/bby-e.jpg" width="300">
      <p class="portrait-caption">I enjoy making art ^-^</p>
    </div>

    <div class="gallery-block">
      <div class="gallery" id="gallery1">
        <div class="slide active">
          <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/townes.png">
        </div>

        <div class="slide">
          <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Transito%20soto.png">
        </div>

        <div class="slide">
          <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/monke.png">
        </div>
      </div>

      <p class="caption" id="caption1"></p>
    </div>

    <div class="gallery-block">
      <div class="gallery" id="gallery2">

        <div class="slide active">
          <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Screenshot%202023-03-30%20093109.png">
        </div>

        <div class="slide">
          <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Screenshot%202023-07-19%20103336.png">
        </div>

      </div>

      <p class="caption" id="caption2"></p>
    </div>

  </div>

  <p>
    <a href="artists-i-like.html">Artists I Like</a>
  </p>

  <script>
    let index1 = 0;
    const slides1 = document.querySelectorAll('#gallery1 .slide');
    const captions1 = [
      "Oil painting of Townes Van Zandt",
      "Acrylic painting inspired by Isabel Allende's House of the Spirits",
      "Watercolor Golden Snub-Nosed Monkey Book"
    ];
    const caption1 = document.getElementById("caption1");
    caption1.textContent = captions1[0];

    function next1() {
      slides1[index1].classList.remove('active');
      index1 = (index1 + 1) % slides1.length;
      slides1[index1].classList.add('active');
      caption1.textContent = captions1[index1];
    }
    setInterval(next1, 3000);

    let index2 = 0;
    const slides2 = document.querySelectorAll('#gallery2 .slide');
    const captions2 = [
      "Figure drawing June 2022",
      "Sketchbook page circa 2020"
    ];
    const caption2 = document.getElementById("caption2");
    caption2.textContent = captions2[0];

    function next2() {
      slides2[index2].classList.remove('active');
      index2 = (index2 + 1) % slides2.length;
      slides2[index2].classList.add('active');
      caption2.textContent = captions2[index2];
    }
    setInterval(next2, 3000);
  </script>

</body>
</html>
