<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About My Art</title>

  <style>
    body {
      background-color: black;
    }

    .header-img {
      width: 100%;
      height: auto;
      max-width: 3000px;
      display: block;
      margin: 0 auto 20px;
    }

    p {
      font-size: 20px;
      color: white;
    }

    /* ⭐ FIXED-HEIGHT GALLERY, VARIABLE WIDTH */
    .gallery {
      height: 350px;          /* fixed height */
      display: inline-block;  /* width adjusts to image */
      overflow: hidden;       /* prevents layout jump */
      margin-left: 0;
      vertical-align: top;
    }

    .gallery img {
      height: 100%;           /* image scales to fixed height */
      width: auto;            /* width varies naturally */
      display: block;
    }

    .caption {
      color: white;
      font-size: 18px;
      margin: 8px 0 20px 0;
      text-align: left;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }
  </style>
</head>

<body>

  <img class="header-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/header-art.png">

  <div class="gallery">
    <div class="slide active">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/townes.png">
    </div>

    <div class="slide">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Transito%20soto.png">
    </div>
  </div>

  <!-- ⭐ Captions OUTSIDE the fixed-height box -->
  <p class="caption" id="caption-text">Oil painting of Townes Van Zandt</p>

  <p>
    <a href="artists-i-like.html">Artists I Like</a>
  </p>

  <script>
    let index = 0;
    const slides = document.querySelectorAll('.slide');
    const captions = [
      "Oil painting of Townes Van Zandt",
      "Acrylic painting inspired by Isabel Allende's House of the Spirits"
    ];
    const captionText = document.getElementById("caption-text");

    function showNext() {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
      captionText.textContent = captions[index];
    }

    setInterval(showNext, 3000);
  </script>

</body>
</html>
