<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About My Art</title>

  <style>
    body {
      background-color: black;
    }

    .header-img {
      width: 100%;      /* lets it shrink on small screens */
      height: auto;     /* keeps proportions correct */
      max-width: 3000px; /* optional: controls desktop size */
      display: block;
      margin: 0 auto 20px;
    }

    p {
      font-size: 20px;
      color: white;
    }
    .gallery {
      width: 400px;          /* or whatever size you want */
      height: 350px;         /* ⭐ fixed height */
      overflow: hidden;      /* hides anything taller than the box */
      position: relative;
      margin-left: 0;        /* ⭐ sits on the left */
      margin-top: 20px;
    }

  .gallery img {
      width: 100%;
      height: 100%;          /* ⭐ fills the fixed-height box */
      object-fit: cover;     /* keeps the image nicely cropped */
      border: 3px solid #ff008f;
    }


  .caption {
      color: white;
      text-align: left;
      margin-top: 8px;
      font-size: 18px;
    }

  .slide {
      display: none;
    }

  .slide.active {
      display: block;
  }
  </style>
</head>

<body>
  <img class="header-img" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/header-art.png">
  <div class="gallery">
  <div class="slide active">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/townes.png">
    <p class="caption">Oil painting of Townes Van Zandt</p>
  </div>

  <div class="slide">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Transito%20soto.png">
    <p class="caption">Acrylic painting inspired by Isabel Allende's House of the Spirits</p>
  </div>

    <a href="artists-i-like.html">Artists I Like</a>
  </p>
  <script>
  let index = 0;
  const slides = document.querySelectorAll('.slide');

  function showNext() {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
  }

  setInterval(showNext, 3000); // change every 3 seconds
</script>
</body>
</html>
