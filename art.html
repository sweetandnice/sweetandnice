<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About My Art</title>

  <style>
   body {
      background-color: black;
      margin: 0;
      padding: 0;
      font-family: "Times New Roman", serif; 
    }

    p {
      font-size: 20px;
      color: #ff008f;
      line-height: 1.5;
      text-align: center;
    }

    a {
      color: #ff9be6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ⭐ TOP GIF FIX */
    .top-gif {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .intro {
      padding: 20px;
      text-align: center;
    }

    .intro img {
      width: 350px;
      border-radius: 0;
      display: block;
      margin: 0 auto 15px auto;
    }
    
    .intro-photos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-bottom: 15px;
    }

    .intro-photos img {
      height: 350px;
      width: auto;
      border-radius: 0;
      margin: 0;
    }

    /* WRAPPER FOR ALL IMAGES */
    .hover-wrap {
      position: relative;
      display: inline-block;
    }

    .hover-wrap img {
      display: block;
    }

    /* OVERLAY */
    .hover-text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(235, 123, 39, 0.85);
      color: white;
      font-size: 16px;
      text-align: center;
      padding: 12px;
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 0.25s ease;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow-wrap: break-word;
      overflow-y: auto;
      pointer-events: none;
    }

    /* Desktop hover */
    .hover-wrap:hover .hover-text {
      opacity: 1;
    }

    /* Mobile tap */
    .hover-wrap:active .hover-text,
    .hover-wrap:focus .hover-text {
      opacity: 1;
    }

    /* Zine Video */
    .full-video {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto 10px auto;
}

    /* ⭐ MOBILE FIXES */
    @media (max-width: 600px) {

      .intro-photos {
        overflow-x: auto;
        white-space: nowrap;
        display: flex;
        gap: 12px;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
      }

      .intro-photos img {
        height: 250px;
        flex: 0 0 auto;
      }

      .intro-photos::-webkit-scrollbar {
        display: none;
      }

      /* ⭐ FIX: allow overlay text to wrap and expand */
      .hover-text {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;

        height: auto;          /* allow overlay to grow */
        min-height: 100%;      /* still covers image */
        padding: 16px;
        font-size: 14px;

        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        text-align: left;

        overflow-y: auto;      /* scroll if needed */
        white-space: normal;   /* ⭐ allow wrapping */
        word-break: break-word;
      }
    }

  </style>
</head>

<body>

<!-- ⭐ FIXED GIF -->
<img class="top-gif" src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/gifs/stuff_i_made.gif">

<div class="intro">
  <div class="intro-photos">

    <!-- TRANSITO SOTO -->
    <div class="hover-wrap">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Transito%20soto.png" alt="Transito">
      <div class="hover-text">
        Acrylic painting inspired by Tránsito Soto, a character in Isabel Allende's House of the Spirits
      </div>
    </div>

    <!-- MONKE -->
    <div class="hover-wrap">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/monke.png" alt="Monkey">
    </div>

    <!-- BBY-E -->
    <div class="hover-wrap">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/bby-e.jpg" alt="Portrait">
    </div>

    <!-- TOWNES -->
    <div class="hover-wrap">
      <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/townes.png" alt="Townes">
      <div class="hover-text">
        Oil portrait of Townes Van Zandt
      </div>
    </div>

  </div>

  <p>
    I have always enjoyed making art ^-^ I am inspired by artists I like and things I see.
  </p>

  <video class="full-video" autoplay loop muted playsinline>
    <source src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/gifs/0001-0465.mp4" type="video/mp4">
  </video>

  <p>
    Digital recreation of a zine I printed IRL made using Blender.
  </p>
  
</div>

</body>
</html>
