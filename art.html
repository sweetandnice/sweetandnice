<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About My Art</title>

  <style>
    body {
      background-color: black;
    }

    p {
      font-size: 20px;
      color: white;
    }

    /* Put the portrait + gallery next to each other */
    .side-by-side {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .side-by-side img {
      flex-shrink: 0;
    }

    .gallery {
      display: inline-block;
      margin-left: 0;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }

    .gallery img {
      height: 350px;
      width: auto;
      border: 4px solid #ff008f;
      display: block;
    }

    .caption {
      color: white;
      font-size: 18px;
      margin: 8px 0 20px 0;
      text-align: left;
    }
  </style>
</head>

<body>

  <div class="side-by-side">
    <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/bby-e.jpg" width="300">

    <div class="gallery">
      <div class="slide active">
        <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/townes.png">
      </div>

      <div class="slide">
        <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/Transito%20soto.png">
      </div>

      <div class="slide">
        <img src="https://raw.githubusercontent.com/sweetandnice/sweetandnice/refs/heads/main/pics/monke.png">
      </div>
    </div>
  </div>

  <p class="caption" id="caption-text"></p>

  <p>
    <a href="artists-i-like.html">Artists I Like</a>
  </p>

  <script>
    let index = 0;
    const slides = document.querySelectorAll('.slide');
    const captions = [
      "Oil painting of Townes Van Zandt",
      "Acrylic painting inspired by Isabel Allende's House of the Spirits",
      "Watercolor Golden Snub-Nosed Monkey Book"
    ];
    const captionText = document.getElementById("caption-text");

    captionText.textContent = captions[0];

    function showNext() {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
      captionText.textContent = captions[index];
    }

    setInterval(showNext, 3000);
  </script>

</body>
</html>
